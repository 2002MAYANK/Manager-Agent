services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-manager_agent}"
      DB_USERNAME: "${DB_USERNAME:-manager_agent}"
      DB_PASSWORD: "${DB_PASSWORD:-manager_agent_password}"
      DB_SSLMODE: prefer
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    env_file:
      - .env
    depends_on:
      pgsql:
        condition: service_healthy

  pgsql:
    image: postgres:16-alpine
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-manager_agent}"
      POSTGRES_USER: "${DB_USERNAME:-manager_agent}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-manager_agent_password}"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgsql-data:
